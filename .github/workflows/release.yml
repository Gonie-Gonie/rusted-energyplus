name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$') {
              throw "Release tag must match vMAJOR.MINOR.PATCH: $tag"
          }

          $version = $tag.Substring(1)
          $verifyScript = "scripts\v$($Matches.major).$($Matches.minor)-verify.ps1"
          $notesFile = "docs\src\releases\$tag.md"
          $artifact = "dist\eplus-rs-$tag-windows-x64.zip"

          if (-not (Test-Path -LiteralPath $verifyScript -PathType Leaf)) {
              throw "Missing release verification script: $verifyScript"
          }
          if (-not (Test-Path -LiteralPath $notesFile -PathType Leaf)) {
              throw "Missing release notes: $notesFile"
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERIFY_SCRIPT=$verifyScript" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES=$notesFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Rust and docs tools
        run: .\scripts\setup.cmd -InstallRust -InstallDocsTools -SkipOracleDownload -SkipSourceDownload -SkipOracleSmoke

      - name: Set up EnergyPlus oracle
        run: .\scripts\setup.cmd -SkipSourceDownload -SkipOracleSmoke

      - name: Set up EnergyPlus reference source
        run: .\scripts\setup.cmd -SkipOracleDownload -SkipOracleSmoke

      - name: Verify release
        run: |
          $verifyScript = (Resolve-Path -LiteralPath $env:VERIFY_SCRIPT).Path
          & $verifyScript

      - name: Check packaged binary
        run: |
          if (-not (Test-Path -LiteralPath $env:RELEASE_ARTIFACT -PathType Leaf)) {
              throw "Missing release artifact: $env:RELEASE_ARTIFACT"
          }

          $binary = (Resolve-Path -LiteralPath "target\release\eplus-rs.exe").Path
          $binaryVersion = & $binary --version
          $expectedVersion = "eplus-rs $env:RELEASE_VERSION"
          if ($binaryVersion -ne $expectedVersion) {
              throw "Release binary reported '$binaryVersion', expected '$expectedVersion'"
          }

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh --version

          $releaseTitle = "eplus-rs $env:RELEASE_VERSION"
          if (gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null) {
              gh release edit $env:RELEASE_TAG `
                  --repo $env:GITHUB_REPOSITORY `
                  --title $releaseTitle `
                  --notes-file $env:RELEASE_NOTES `
                  --prerelease
              gh release upload $env:RELEASE_TAG $env:RELEASE_ARTIFACT `
                  --repo $env:GITHUB_REPOSITORY `
                  --clobber
          }
          else {
              gh release create $env:RELEASE_TAG $env:RELEASE_ARTIFACT `
                  --repo $env:GITHUB_REPOSITORY `
                  --verify-tag `
                  --title $releaseTitle `
                  --notes-file $env:RELEASE_NOTES `
                  --prerelease
          }

id = "official_1zone_uncontrolled_dynamic_diagnostic_001"
title = "Official 1ZoneUncontrolled dynamic heat-balance diagnostic"
milestone = "v0.33-official-dynamic-diagnostic"
purpose = "Track Rust vs EnergyPlus hourly dynamic heat-balance deltas for the official 1ZoneUncontrolled ExampleFile without claiming conformance."
comparison_class = "diagnostic-only"
conformance_claim = false
oracle_version = "26.1.0"
notes = [
  "This case is the official dynamic heat-balance diagnostic gate before any conformance_claim=true promotion.",
  "The report filters EnergyPlus ESO samples to the reported RUN PERIOD environment so sizing/design-day samples do not hide the real hourly delta.",
  "The report records Rust first-run-period-day warmup metadata and EnergyPlus EIO run-period warmup day counts for parity diagnosis.",
  "Current expected status is fail. Promotion requires source-map-backed warmup, surface temperature, surface balance, CTF/conduction, solar, and convection parity before changing the claim boundary.",
]


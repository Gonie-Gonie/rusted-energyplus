id = "weather_fields_001"
title = "Weather hourly field output requests"
milestone = "v0.22-time-weather-schedule-conformance"
purpose = "Tolerance-gate the declared Site Outdoor Air Drybulb Temperature hourly series against the EnergyPlus oracle for the weather fixture."
comparison_class = "conformance"
conformance_claim = true
oracle_version = "26.1.0"
notes = [
  "The v0.22 conformance claim is limited to dry-bulb temperature.",
  "Dew point, relative humidity, barometric pressure, wind speed, and wind direction remain diagnostic rows in the same report.",
  "Radiation EPW fields remain parser evidence and require separate ESO report promotion before they become comparison evidence.",
]

[manifest_v2]
schema = "rusted-energyplus.case-manifest.v2"
source_kind = "local-fixture"
source_file = "data/conformance_cases/weather_fields_001/weather_fields.idf"
tier = "A"

[scope]
domains = ["weather"]
has_zone = false
has_surface = false
has_fenestration = false
has_air_loop = false
has_plant_loop = false
has_ems = false
has_python_plugin = false
has_daylighting = false

[input]
idf = "data/conformance_cases/weather_fields_001/weather_fields.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Drybulb Temperature"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "conformance"
abs_tol = 0.00001
rmse_tol = 0.00001
rel_tol = 0.000001

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Dewpoint Temperature"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Relative Humidity"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Barometric Pressure"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Wind Speed"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Wind Direction"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[tolerances]]
variable_class = "weather"
max_abs = 0.00001
max_rmse = 0.00001
max_rel = 0.000001

[report]
format = "markdown"
path = ".runtime/time-weather-schedule-conformance/26.1.0/weather_fields_001/compare/compare-report.md"

[gate]
script = "scripts/dev.cmd compare-weather-conformance"
blocking = true

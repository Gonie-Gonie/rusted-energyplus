id = "weather_fields_001"
title = "Weather hourly field output requests"
milestone = "v0.4-time-weather-schedule"
purpose = "Define the v0.4 weather field evidence surface before tolerance-gated conformance is claimed."
comparison_class = "smoke"
conformance_claim = false
oracle_version = "26.1.0"
notes = [
  "The smoke gate compares EPW weather fields against EnergyPlus ESO with an explicit small weather tolerance.",
  "The blocking v0.4 smoke list is dry-bulb, dew point, relative humidity, barometric pressure, wind speed, and wind direction.",
  "Radiation EPW fields are parser evidence in v0.4 and require separate ESO report promotion before they become comparison evidence.",
  "This case remains non-blocking smoke evidence until a full conformance report includes Rust artifacts and blocking gates.",
]

[manifest_v2]
schema = "rusted-energyplus.case-manifest.v2"
source_kind = "local-fixture"
source_file = "data/conformance_cases/weather_fields_001/weather_fields.idf"
tier = "A"

[scope]
domains = ["weather"]
has_zone = false
has_surface = false
has_fenestration = false
has_air_loop = false
has_plant_loop = false
has_ems = false
has_python_plugin = false
has_daylighting = false

[input]
idf = "data/conformance_cases/weather_fields_001/weather_fields.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Drybulb Temperature"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Dewpoint Temperature"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Relative Humidity"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Outdoor Air Barometric Pressure"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Wind Speed"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[[outputs]]
key = "Environment"
variable = "Site Wind Direction"
frequency = "hourly"
class = "weather"
source = "eso"
domain = "weather"
level = "diagnostic"

[report]
format = "markdown"
path = ".runtime/conformance/weather_fields_001/compare-report.md"

[gate]
script = "scripts/dev.cmd compare-weather-smoke"
blocking = false

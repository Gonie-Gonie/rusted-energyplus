id = "zone_temperature_diagnostic_001"
title = "Diagnostic zone mean air temperature"
milestone = "P2-heat-balance-diagnostics"
purpose = "Track the heat-balance MAT diagnostic comparison before tolerance-gated conformance is claimed."
comparison_class = "diagnostic-only"
conformance_claim = false
oracle_version = "26.1.0"
notes = [
  "This case documents diagnostic extraction only; it has no tolerance rule and no conformance claim.",
  "The report path points at the compare-zone diagnostic artifacts generated by compare-zone-smoke.",
]

[input]
idf = "data/conformance_cases/zone_temperature_diagnostic_001/zone_temperature.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"

[[outputs]]
key = "ZONE ONE"
variable = "Zone Mean Air Temperature"
frequency = "hourly"
class = "zone-state"

[report]
format = "markdown"
path = ".runtime/compare-zone/26.1.0/compare/compare-report.md"

[gate]
script = "scripts/dev.cmd compare-zone-smoke"
blocking = false

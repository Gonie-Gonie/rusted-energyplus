id = "schedule_constant_001"
title = "Schedule:Constant hourly output request"
milestone = "v0.22-time-weather-schedule-conformance"
purpose = "Tolerance-gate the declared Schedule Value hourly series against the EnergyPlus oracle for the constant schedule subset."
comparison_class = "conformance"
conformance_claim = true
oracle_version = "26.1.0"
notes = [
  "The v0.22 gate compares Schedule Value with EnergyPlus ESO using timestamp-aligned hourly samples.",
  "This claim is limited to the declared Schedule Value series for this local fixture.",
]

[manifest_v2]
schema = "rusted-energyplus.case-manifest.v2"
source_kind = "local-fixture"
source_file = "data/conformance_cases/schedule_constant_001/schedule_constant.idf"
tier = "A"

[scope]
domains = ["schedule"]
has_zone = false
has_surface = false
has_fenestration = false
has_air_loop = false
has_plant_loop = false
has_ems = false
has_python_plugin = false
has_daylighting = false

[input]
idf = "data/conformance_cases/schedule_constant_001/schedule_constant.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"

[[outputs]]
key = "ALWAYSON"
variable = "Schedule Value"
frequency = "hourly"
class = "schedule"
source = "eso"
domain = "schedule"
level = "conformance"
abs_tol = 0.000000000001
rmse_tol = 0.000000000001

[[tolerances]]
variable_class = "schedule"
max_abs = 0.000000000001
max_rmse = 0.000000000001

[report]
format = "markdown"
path = ".runtime/time-weather-schedule-conformance/26.1.0/schedule_constant_001/compare/compare-report.md"

[gate]
script = "scripts/dev.cmd compare-schedule-conformance"
blocking = true

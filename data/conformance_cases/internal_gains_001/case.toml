id = "internal_gains_001"
title = "OtherEquipment internal convective gains conformance"
milestone = "v0.26-internal-convective-gains"
purpose = "Compare Rust OtherEquipment nominal gains with EnergyPlus EIO rows and tolerance-gate the Zone Total Internal Convective Heating Rate ESO trace."
comparison_class = "conformance"
conformance_claim = true
oracle_version = "26.1.0"
notes = [
  "The nominal gate compares OtherEquipment Internal Gains Nominal EIO rows from the dedicated internal_gains_001 fixture.",
  "The v0.26 conformance claim is limited to the hourly Zone Total Internal Convective Heating Rate ESO trace.",
  "The static OtherEquipment nominal EIO rows remain diagnostic in this fixture; official static-model EIO conformance is covered by official_1zone_static_model_001.",
  "This does not claim zone air temperature response to internal gains, radiant/latent coupling, HVAC compatibility, plant compatibility, or meter conformance.",
]

[manifest_v2]
schema = "rusted-energyplus.case-manifest.v2"
source_kind = "local-fixture"
source_file = "data/conformance_cases/internal_gains_001/internal_gains.idf"
tier = "A"

[scope]
domains = ["zone", "surface", "internal-gain"]
has_zone = true
has_surface = true
has_fenestration = false
has_air_loop = false
has_plant_loop = false
has_ems = false
has_python_plugin = false
has_daylighting = false

[input]
idf = "data/conformance_cases/internal_gains_001/internal_gains.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"
epjson = ".runtime/compare-internal-gains/26.1.0/internal-gains.epJSON"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Zone Floor Area"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Equipment Level"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Equipment per Floor Area"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Fraction Latent"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Fraction Radiant"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Fraction Lost"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "*"
variable = "OtherEquipment Internal Gains Nominal Fraction Convected"
frequency = "static"
class = "internal-gain"
source = "eio"
domain = "internal-gain"
level = "diagnostic"

[[outputs]]
key = "ZONE ONE"
variable = "Zone Total Internal Convective Heating Rate"
frequency = "hourly"
class = "internal-gain"
source = "eso"
domain = "internal-gain"
level = "conformance"
abs_tol = 0.000000001
rmse_tol = 0.000000001
rel_tol = 0.000000001

[[tolerances]]
variable_class = "internal-gain"
max_abs = 0.000000001
max_rmse = 0.000000001
max_rel = 0.000000001

[report]
format = "markdown"
path = ".runtime/internal-gains-conformance/26.1.0/internal_gains_001/compare/compare-report.md"

[gate]
script = "scripts/dev.cmd compare-internal-convective-gain-conformance"
blocking = true

id = "official_1zone_static_model_001"
title = "Official 1ZoneUncontrolled static model evidence"
milestone = "v0.23-static-model-evidence"
purpose = "Compare Rust static model interpretation with EnergyPlus EIO surface, construction/material, and OtherEquipment nominal rows for the official 1ZoneUncontrolled ExampleFile."
comparison_class = "conformance"
conformance_claim = true
oracle_version = "26.1.0"
notes = [
  "The source IDF is an official EnergyPlus ExampleFiles input staged from the repo-local oracle installation.",
  "The gate compares static EIO rows only; it does not claim dynamic heat-balance, HVAC, plant, solar, fenestration, sizing, warmup, or meter conformance.",
  "Surface geometry evidence uses Output:Surfaces:List,Details injected into the staged IDF when absent.",
]

[manifest_v2]
schema = "rusted-energyplus.case-manifest.v2"
source_kind = "energy-plus-examplefile"
source_file = ".runtime/energyplus/26.1.0/ExampleFiles/1ZoneUncontrolled.idf"
tier = "B"

[scope]
domains = ["zone", "surface", "construction", "internal-gain"]
has_zone = true
has_surface = true
has_fenestration = false
has_air_loop = false
has_plant_loop = false
has_ems = false
has_python_plugin = false
has_daylighting = false

[input]
idf = ".runtime/energyplus/26.1.0/ExampleFiles/1ZoneUncontrolled.idf"
weather = ".runtime/energyplus/26.1.0/WeatherData/USA_CO_Golden-NREL.724666_TMY3.epw"

[[outputs]]
key = "*"
variable = "HeatTransfer Surface Class"
frequency = "static"
class = "surface-state"
source = "eio"
domain = "surface"
level = "conformance"
abs_tol = 0.01
rel_tol = 0.001

[[outputs]]
key = "*"
variable = "HeatTransfer Surface Area (Net)"
frequency = "static"
class = "surface-state"

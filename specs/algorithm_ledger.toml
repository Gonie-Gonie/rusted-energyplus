  "src/EnergyPlus/HeatBalanceManager.cc",
  "src/EnergyPlus/ZoneTempPredictorCorrector.cc",
]
rust_target = [
  "crates/ep_runtime/src/runtime.rs::ZoneHeatBalanceState",
  "crates/ep_runtime/src/runtime.rs::simulate_heat_balance",
]
